<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-linear-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div
      class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50"
    >
      <div class="text-center mb-10">
        <p class="text-cyan-400 uppercase tracking-[0.3em] text-sm mb-3">Book My Show</p>
        <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-300 to-sky-400 mb-4 tracking-tight">
          Select a seat, book instantly
        </h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">
          Click any available seat to book it. Booked seats show the username on hover.
        </p>
      </div>

      <div class="flex flex-wrap gap-3 justify-center mb-8">
        <div class="bg-slate-900/50 rounded-full px-5 py-3 border border-slate-700 flex gap-4 items-center">
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"></div>
            <span class="text-slate-300 font-medium tracking-wide">Available</span>
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
        <div class="bg-slate-900/50 rounded-full px-5 py-3 border border-slate-700 text-slate-300 flex items-center gap-4">
          Logged in as: <span id="currentUser" class="font-semibold text-white">Guest</span>
          <a href="/login.html" class="text-cyan-300 hover:text-cyan-200 font-semibold">Switch account</a>
          <button id="logoutBtn" class="hidden rounded-full border border-slate-700 bg-slate-950/50 px-4 py-1.5 text-slate-200 hover:bg-slate-800 transition-colors">Logout</button>
        </div>
      </div>

      <div class="flex justify-center">
        <div class="bg-slate-900/40 p-5 md:p-8 rounded-2xl border border-slate-700/50 shadow-inner overflow-x-auto">
          <table id="tbl" class="border-separate border-spacing-4 mx-auto"></table>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
