<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet">
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-background text-foreground"
  >
    <div
      class="max-w-7xl w-full bg-card backdrop-blur-xl [border-radius:calc(var(--radius)+16px)] shadow-2xl p-10 border border-border"
    >
      <div class="text-center mb-10">
        <p class="text-primary uppercase tracking-[0.3em] text-sm mb-3">Book My Show</p>
        <h1 class="text-4xl md:text-5xl font-bold text-primary mb-4 tracking-tight">
          Select a seat
        </h1>
      </div>

      <div class="flex flex-wrap gap-3 justify-center mb-8">
        <div class="bg-background/50 rounded-full px-5 py-3 border border-border flex gap-4 items-center" style="border-radius: calc(var(--radius) + 100px)">
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-primary" style="border-radius: calc(var(--radius) + 100px); box-shadow: 0 0 12px color-mix(in oklch, var(--primary), transparent 40%)"></div>
            <span class="text-foreground font-medium tracking-wide">Available</span>
          </div>
          <div class="w-px h-6 bg-border"></div>
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-destructive/20 border border-destructive/50"></div>
            <span class="text-muted-foreground font-medium tracking-wide">Booked</span>
          </div>
        </div>
        <div class="bg-background/50 rounded-full px-5 py-3 border border-border text-foreground flex items-center gap-4" style="border-radius: calc(var(--radius) + 100px)">
          Logged in as: <span id="currentUser" class="font-semibold text-muted-foreground">Guest</span>
          <button id="logoutBtn" class="hidden border border-border bg-background/50 px-4 py-1.5 text-foreground hover:bg-secondary transition-colors" style="border-radius: calc(var(--radius) + 100px)">Logout</button>
        </div>
      </div>

      <div class="flex justify-center">
        <div class="bg-background/40 p-5 md:p-8 border border-border overflow-x-auto" style="border-radius: calc(var(--radius) + 8px)">
          <table id="tbl" class="border-separate border-spacing-4 mx-auto"></table>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
